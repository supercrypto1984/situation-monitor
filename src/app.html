<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Real-time global situation monitoring dashboard" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<title>Situation Monitor</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="google_translate_element" style="position:absolute; top:10px; right:10px; z-index:9999;"></div>
		<script type="text/javascript">
			function googleTranslateElementInit() {
				new google.translate.TranslateElement({
					pageLanguage: 'en',
					includedLanguages: 'zh-CN', // Only offer Chinese (Simplified)
					layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
					autoDisplay: false
				}, 'google_translate_element');
			}
		</script>
		<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
